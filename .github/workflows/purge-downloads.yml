name: پاکسازی پوشه downloads

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-downloads:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کل ریپازیتوری
        uses: actions/checkout@v4

      - name: پاک کردن محتویات downloads
        run: |
          if [ -d "downloads" ]; then
            echo "🧹 در حال پاکسازی پوشه downloads..."
            rm -rf downloads/*
            echo "✅ محتویات پوشه downloads پاک شد"
          else
            echo "⚠️ پوشه downloads وجود نداره"
          fi

      - name: Commit و Push تغییرات
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add downloads/
          git commit -m "🧹 پاکسازی پوشه downloads"
          git push
          
          echo "🎉 پوشه downloads با موفقیت خالی شد!"
