name: بازسازی و پاکسازی پوشه downloads

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-downloads:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کل ریپازیتوری
        uses: actions/checkout@v4

      - name: بازسازی پوشه downloads
        run: |
          # پوشه رو با یه فایل .gitkeep بساز
          mkdir -p downloads
          touch downloads/.gitkeep
          echo "✅ پوشه downloads با فایل .gitkeep ساخته شد"

      - name: Commit و Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add downloads/
          git commit -m "📁 بازسازی پوشه downloads"
          git push
          
          echo "🎉 پوشه downloads برگشت!"
