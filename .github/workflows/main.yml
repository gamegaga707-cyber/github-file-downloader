name: دانلود چند فایل (سرعت بالا + درصد زنده + حجم کل)

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'لینک‌ها با جداکننده ;'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور فایل‌های ZIP'
        required: true
        type: string
      custom_folder:
        description: 'نام پوشه (اختیاری)'
        required: false
        type: string
        default: ''
      delimiter:
        description: 'جداکننده (پیش‌فرض: ;)'
        required: false
        type: string
        default: ';'

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت مخزن (فقط ساختار git، بدون فایل)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .nonexistent-file
          sparse-checkout-cone-mode: false

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full aria2

      - name: ایجاد پوشه اصلی
        run: |
          if [ -n "${{ github.event.inputs.custom_folder }}" ]; then
            MAIN_FOLDER="downloads/${{ github.event.inputs.custom_folder }}"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            MAIN_FOLDER="downloads/batch_${TIMESTAMP}_${{ github.run_number }}"
          fi
          mkdir -p "$MAIN_FOLDER"
          echo "MAIN_FOLDER=$MAIN_FOLDER" >> $GITHUB_ENV
          echo "📁 پوشه: $MAIN_FOLDER"

      - name: دانلود و پردازش (با درصد زنده)
        run: |
          DELIMITER="${{ github.event.inputs.delimiter }}"
          IFS="$DELIMITER" read -ra urls <<< "${{ github.event.inputs.file_urls }}"
          
          clean_urls=()
          for url in "${urls[@]}"; do
            url=$(echo "$url" | xargs)
            [ -n "$url" ] && clean_urls+=("$url")
          done
          
          total_urls=${#clean_urls[@]}
          echo "📊 تعداد لینک: $total_urls"
          
          success=0
          fail=0
          file_index=0
          total_bytes=0  # مجموع حجم فایل‌های دانلود شده
          
          for i in "${!clean_urls[@]}"; do
            url="${clean_urls[$i]}"
            current=$((i + 1))
            file_index=$((file_index + 1))
            
            # استخراج نام فایل از URL
            RAW_FILENAME=$(echo "$url" | grep -oP '[^/]+\.(mp4|mkv|avi|mov|webm|flv|mp3|m4a|jpg|png|gif|pdf|zip|rar|7z)(\?.*)?$' | cut -d '?' -f1)
            
            if [ -z "$RAW_FILENAME" ]; then
              RAW_FILENAME=$(basename "$url" | cut -d '?' -f1 | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null || basename "$url" | cut -d '?' -f1)
            fi
            
            FILENAME=$(echo "$RAW_FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            if [ -z "$FILENAME" ] || [ ${#FILENAME} -lt 3 ] || [ ${#FILENAME} -gt 80 ]; then
              FILENAME=$(printf "file_%02d" $current)
            fi
            
            echo ""
            echo "═════════════════════════════════════════════"
            echo "📥 [$current/$total_urls] $FILENAME"
            
            # دانلود با aria2c - نوار پیشرفت زنده
            if aria2c --summary-interval=0 --console-log-level=notice \
                 --allow-overwrite=true --max-tries=5 --retry-wait=5 \
                 --connect-timeout=20 --timeout=900 \
                 --dir="${{ env.MAIN_FOLDER }}" --out="$FILENAME" \
                 "$url" 2>&1; then
              
              FILE_SIZE=$(stat -c%s "${{ env.MAIN_FOLDER }}/${FILENAME}" 2>/dev/null || echo 0)
              if [ "$FILE_SIZE" = "0" ]; then
                echo "❌ حجم صفر - رد شد"
                rm -f "${{ env.MAIN_FOLDER }}/${FILENAME}"
                fail=$((fail + 1))
                continue
              fi
              
              echo "✅ $FILENAME ($(numfmt --to=iec $FILE_SIZE))"
              total_bytes=$((total_bytes + FILE_SIZE))  # افزودن حجم به مجموع
              
              # تشخیص نوع فایل
              MIME=$(file --mime-type -b "${{ env.MAIN_FOLDER }}/${FILENAME}" 2>/dev/null)
              
              case "$MIME" in
                video/mp4)             EXT=".mp4" ;;
                video/x-matroska)      EXT=".mkv" ;;
                video/webm)            EXT=".webm" ;;
                video/x-msvideo)       EXT=".avi" ;;
                video/quicktime)       EXT=".mov" ;;
                audio/mpeg)            EXT=".mp3" ;;
                audio/mp4)             EXT=".m4a" ;;
                image/jpeg)            EXT=".jpg" ;;
                image/png)             EXT=".png" ;;
                application/pdf)       EXT=".pdf" ;;
                application/zip)       EXT=".zip" ;;
              esac
              
              if [ -n "$EXT" ] && [[ ! "$FILENAME" =~ \.[a-zA-Z0-9]+$ ]]; then
                mv "${{ env.MAIN_FOLDER }}/${FILENAME}" "${{ env.MAIN_FOLDER }}/${FILENAME}${EXT}"
                FILENAME="${FILENAME}${EXT}"
              fi
              
              # اسم ساده برای فایل فشرده: file_01, file_02 و...
              ARCHIVE_NAME=$(printf "file_%02d" $file_index)
              
              cd "${{ env.MAIN_FOLDER }}"
              
              if 7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=0 -v95m \
                   "${ARCHIVE_NAME}.7z" "$FILENAME" > /dev/null 2>&1; then
                echo "  🗜️ ${ARCHIVE_NAME}.7z.xxx (حاوی: $FILENAME)"
                rm -f "$FILENAME"
                success=$((success + 1))
              else
                echo "  ❌ خطای فشرده‌سازی"
                fail=$((fail + 1))
              fi
              
              cd - > /dev/null
            else
              echo "❌ خطای دانلود $FILENAME"
              fail=$((fail + 1))
            fi
          done
          
          echo ""
          echo "═════════════════════════════════════════════"
          echo "📊 آمار نهایی: کل=$total_urls | ✅$success | ❌$fail"
          echo "📊 مجموع حجم دانلود موفق: $(numfmt --to=iec $total_bytes)"
          echo "═════════════════════════════════════════════"

      - name: commit و push (بهینه‌شده)
        run: |
          git sparse-checkout disable
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cd "${{ env.MAIN_FOLDER }}"
          chunks=(*.7z.*)
          total=${#chunks[@]}
          
          if [ $total -eq 0 ]; then
            echo "❌ تکه‌ای نیست!"
            exit 1
          fi
          
          echo "📦 $total تکه"
          
          BATCH=15
          start=0
          
          while [ $start -lt $total ]; do
            end=$((start + BATCH - 1))
            [ $end -ge $total ] && end=$((total - 1))
            
            echo "📤 [$((start+1))-$((end+1))]"
            
            for i in $(seq $start $end); do
              git add "${chunks[$i]}"
            done
            
            git commit -m "📦 $((start+1))-$((end+1))/$total [${{ env.MAIN_FOLDER }}]"
            git pull --rebase && git push || sleep 5 && git pull --rebase && git push
            
            start=$((end + 1))
          done
          
          echo "🎉 تموم!"
