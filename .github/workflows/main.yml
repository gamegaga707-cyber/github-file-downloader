name: دانلود چند فایل با نت ملی

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'لینک‌های مستقیم (هر خط یک لینک)'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور برای فایل‌های ZIP'
        required: true
        type: string
      custom_folder:
        description: 'نام پوشه اصلی (اختیاری)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full curl

      - name: ایجاد پوشه اصلی
        run: |
          if [ -n "${{ github.event.inputs.custom_folder }}" ]; then
            MAIN_FOLDER="downloads/${{ github.event.inputs.custom_folder }}"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            MAIN_FOLDER="downloads/batch_${TIMESTAMP}_${{ github.run_number }}"
          fi
          
          mkdir -p "$MAIN_FOLDER"
          echo "MAIN_FOLDER=$MAIN_FOLDER" >> $GITHUB_ENV
          echo "📁 پوشه اصلی: $MAIN_FOLDER"

      - name: پردازش صف دانلود
        run: |
          # تبدیل لینک‌ها به آرایه
          mapfile -t urls <<< "${{ github.event.inputs.file_urls }}"
          total_urls=${#urls[@]}
          
          echo "🔗 تعداد لینک‌های دریافتی: $total_urls"
          
          current=1
          for url in "${urls[@]}"; do
            # حذف فضاهای خالی
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            
            echo "========================================="
            echo "📥 [$current از $total_urls] در حال پردازش: $url"
            echo "========================================="
            
            # استخراج نام فایل
            FILENAME=$(basename "$url" | cut -d '?' -f1)
            if [ -z "$FILENAME" ] || [ "$FILENAME" = "download" ]; then
              FILENAME="file_${current}"
            fi
            
            # پوشه مخصوص این فایل
            FILE_FOLDER="${{ env.MAIN_FOLDER }}/${FILENAME}"
            mkdir -p "$FILE_FOLDER"
            
            # دانلود
            echo "⬇️ در حال دانلود..."
            if curl -L --fail --retry 3 --retry-delay 5 -o "$FILE_FOLDER/downloaded_file" "$url"; then
              echo "✅ دانلود موفق"
            else
              echo "❌ خطا در دانلود $url - رد شدن از این فایل"
              current=$((current + 1))
              continue
            fi
            
            # تشخیص فرمت واقعی
            MIME_TYPE=$(file --mime-type -b "$FILE_FOLDER/downloaded_file")
            echo "📊 نوع فایل: $MIME_TYPE"
            
            case "$MIME_TYPE" in
              application/zip)               EXT=".zip" ;;
              application/x-rar)             EXT=".rar" ;;
              application/x-7z-compressed)   EXT=".7z" ;;
              application/pdf)               EXT=".pdf" ;;
              application/x-msdownload)      EXT=".exe" ;;
              application/vnd.android.package-archive) EXT=".apk" ;;
              image/jpeg)                    EXT=".jpg" ;;
              image/png)                     EXT=".png" ;;
              image/gif)                     EXT=".gif" ;;
              video/mp4)                     EXT=".mp4" ;;
              video/x-matroska)              EXT=".mkv" ;;
              audio/mpeg)                    EXT=".mp3" ;;
              application/json)              EXT=".json" ;;
              application/xml)               EXT=".xml" ;;
              *)                             EXT="" ;;
            esac
            
            FINAL_NAME="${FILENAME}${EXT}"
            mv "$FILE_FOLDER/downloaded_file" "$FILE_FOLDER/${FINAL_NAME}"
            echo "📄 نام نهایی: $FINAL_NAME"
            
            # فشرده‌سازی و تکه‌تکه کردن
            echo "🗜️ در حال فشرده‌سازی..."
            cd "$FILE_FOLDER"
            7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=3 -v95m "archive.7z" "$FINAL_NAME"
            rm -f "$FINAL_NAME"  # حذف فایل اصلی بعد از فشرده‌سازی
            cd - > /dev/null
            
            echo "✅ [$current از $total_urls] تکمیل شد"
            current=$((current + 1))
          done
          
          echo "🎉 تمام لینک‌ها پردازش شدند!"

      - name: ایجاد فایل راهنما
        run: |
          cat > "${{ env.MAIN_FOLDER }}/README.md" << EOF
          # اطلاعات دانلود گروهی
          
          - 📅 **تاریخ:** $(date +'%Y-%m-%d %H:%M:%S')
          - 🔢 **شماره اجرا:** ${{ github.run_number }}
          - 🔗 **تعداد فایل‌ها:** $(ls -d ${{ env.MAIN_FOLDER }}/*/ 2>/dev/null | wc -l)
          
          ## لینک‌های دانلود شده:
          ${{ github.event.inputs.file_urls }}
          
          ## راهنمای استخراج:
          ۱. به پوشه هر فایل بروید
          ۲. تمام تکه‌های \`archive.7z.*\` را دانلود کنید
          ۳. با 7-Zip فایل \`.001\` را باز کنید
          ۴. رمز عبور را وارد کنید
          EOF
          
          git add "${{ env.MAIN_FOLDER }}/README.md"
          git commit -m "📝 Add README for batch ${{ env.MAIN_FOLDER }}"
          git push

      - name: commit و push تکه‌ها
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # پیدا کردن تمام تکه‌ها
          mapfile -t all_chunks < <(find "${{ env.MAIN_FOLDER }}" -name "archive.7z.*" | sort)
          total=${#all_chunks[@]}
          
          if [ $total -eq 0 ]; then
            echo "❌ هیچ تکه‌ای یافت نشد!"
            exit 1
          fi
          
          echo "📦 مجموع تکه‌ها: $total"
          batch_size=10
          start=0
          
          while [ $start -lt $total ]; do
            end=$((start + batch_size - 1))
            [ $end -ge $total ] && end=$((total - 1))
            
            echo "📤 Push تکه‌های $((start+1)) تا $((end+1)) از $total"
            
            for i in $(seq $start $end); do
              git add "${all_chunks[$i]}"
            done
            
            git commit -m "📦 [${{ env.MAIN_FOLDER }}] Chunks $((start+1))-$((end+1))"
            
            for attempt in {1..5}; do
              if git push; then
                echo "✅ Push موفق"
                break
              else
                echo "⚠️ تلاش $attempt ناموفق - ۱۰ ثانیه صبر"
                sleep 10
              fi
            done
            
            start=$((end + 1))
            sleep 5
          done
          
          echo "🎉 آپلود کامل شد!"

      - name: نمایش نتیجه نهایی
        run: |
          echo "========================================="
          echo "📊 گزارش نهایی:"
          echo "📁 پوشه: ${{ env.MAIN_FOLDER }}"
          echo "📂 تعداد فایل‌های دانلود شده:"
          ls -d ${{ env.MAIN_FOLDER }}/*/
          echo "========================================="
