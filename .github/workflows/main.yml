name: دانلود چند فایل (بهینه و سریع)

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'لینک‌ها با جداکننده ;'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور فایل‌های ZIP'
        required: true
        type: string
      custom_folder:
        description: 'نام پوشه (اختیاری)'
        required: false
        type: string
        default: ''
      delimiter:
        description: 'جداکننده (پیش‌فرض: ;)'
        required: false
        type: string
        default: ';'

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full curl

      - name: ایجاد پوشه اصلی
        run: |
          if [ -n "${{ github.event.inputs.custom_folder }}" ]; then
            MAIN_FOLDER="downloads/${{ github.event.inputs.custom_folder }}"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            MAIN_FOLDER="downloads/batch_${TIMESTAMP}_${{ github.run_number }}"
          fi
          mkdir -p "$MAIN_FOLDER"
          echo "MAIN_FOLDER=$MAIN_FOLDER" >> $GITHUB_ENV
          echo "📁 پوشه: $MAIN_FOLDER"

      - name: دانلود و پردازش (بهینه‌شده)
        run: |
          DELIMITER="${{ github.event.inputs.delimiter }}"
          IFS="$DELIMITER" read -ra urls <<< "${{ github.event.inputs.file_urls }}"
          
          # پاکسازی لینک‌ها
          clean_urls=()
          for url in "${urls[@]}"; do
            url=$(echo "$url" | xargs)
            [ -n "$url" ] && clean_urls+=("$url")
          done
          
          total_urls=${#clean_urls[@]}
          echo "📊 تعداد لینک: $total_urls"
          
          success=0
          fail=0
          
          for i in "${!clean_urls[@]}"; do
            url="${clean_urls[$i]}"
            current=$((i + 1))
            
            echo ""
            echo "═════════════════════════════════════════════"
            echo "📥 [$current/$total_urls] ${url:0:80}..."
            echo "═════════════════════════════════════════════"
            
            # تلاش برای پیدا کردن اسم واقعی فایل از URL
            RAW_FILENAME=$(basename "$url" | cut -d '?' -f1 | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            # اگر اسم فایل معنی‌دار بود (کمتر از ۶۰ کاراکتر و پسوند داشت)
            if [ -n "$RAW_FILENAME" ] && [ ${#RAW_FILENAME} -lt 60 ] && [[ "$RAW_FILENAME" =~ \.[a-zA-Z0-9]+$ ]]; then
              FILENAME="$RAW_FILENAME"
              echo "📎 اسم اصلی: $FILENAME"
            else
              # برای لینک‌های طولانی، اسم ساده بذار
              FILENAME=$(printf "file_%02d" $current)
              echo "📎 اسم ساده: $FILENAME"
            fi
            
            # حذف پسوند برای اسم فایل فشرده
            BASENAME="${FILENAME%.*}"
            
            # دانلود مستقیم با اسم نهایی
            echo "⬇️ دانلود..."
            
            if curl -L --fail --retry 3 --retry-delay 5 \
                 --connect-timeout 30 --max-time 600 \
                 -o "${{ env.MAIN_FOLDER }}/${FILENAME}" \
                 "$url" 2>&1; then
              
              FILE_SIZE=$(stat -c%s "${{ env.MAIN_FOLDER }}/${FILENAME}")
              
              if [ "$FILE_SIZE" = "0" ]; then
                echo "❌ حجم صفر - رد شد"
                rm -f "${{ env.MAIN_FOLDER }}/${FILENAME}"
                fail=$((fail + 1))
                continue
              fi
              
              echo "✅ دانلود شد: $(numfmt --to=iec $FILE_SIZE)"
              
              # تشخیص فرمت واقعی فایل
              MIME=$(file --mime-type -b "${{ env.MAIN_FOLDER }}/${FILENAME}")
              
              case "$MIME" in
                video/mp4)             EXT=".mp4" ;;
                video/x-matroska)      EXT=".mkv" ;;
                video/webm)            EXT=".webm" ;;
                video/x-msvideo)       EXT=".avi" ;;
                video/quicktime)       EXT=".mov" ;;
                video/x-flv)           EXT=".flv" ;;
                audio/mpeg)            EXT=".mp3" ;;
                audio/mp4)             EXT=".m4a" ;;
                image/jpeg)            EXT=".jpg" ;;
                image/png)             EXT=".png" ;;
                image/gif)             EXT=".gif" ;;
                application/pdf)       EXT=".pdf" ;;
                application/zip)       EXT=".zip" ;;
                application/x-rar)     EXT=".rar" ;;
                application/x-7z-compressed) EXT=".7z" ;;
                *)                     EXT="" ;;
              esac
              
              # اضافه کردن پسوند واقعی (اگه از قبل نداشت)
              if [[ "$FILENAME" =~ \.[a-zA-Z0-9]+$ ]]; then
                # قبلاً پسوند داره
                FINAL_NAME="$FILENAME"
              else
                # پسوند نداره، پسوند واقعی رو اضافه کن
                FINAL_NAME="${FILENAME}${EXT}"
                mv "${{ env.MAIN_FOLDER }}/${FILENAME}" "${{ env.MAIN_FOLDER }}/${FINAL_NAME}"
              fi
              
              echo "📄 $FINAL_NAME"
              
              # فشرده‌سازی با BASENAME (بدون پسوند)
              echo "🗜️ فشرده‌سازی..."
              cd "${{ env.MAIN_FOLDER }}"
              
              if 7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=1 -v95m \
                   "${BASENAME}.7z" "$FINAL_NAME" > /dev/null 2>&1; then
                echo "✅ فشرده شد: ${BASENAME}.7z.xxx"
                rm -f "$FINAL_NAME"
                success=$((success + 1))
              else
                echo "❌ خطای فشرده‌سازی"
                fail=$((fail + 1))
              fi
              
              cd - > /dev/null
            else
              echo "❌ خطای دانلود (کد: $?)"
              fail=$((fail + 1))
            fi
            
            echo "📈 [$current/$total_urls] ✅$success ❌$fail"
            sleep 2
          done
          
          echo ""
          echo "═════════════════════════════════════════════"
          echo "📊 نهایی: کل=$total_urls | ✅$success | ❌$fail"
          echo "═════════════════════════════════════════════"

      - name: commit و push (بهینه‌شده)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cd "${{ env.MAIN_FOLDER }}"
          chunks=(*.7z.*)
          total=${#chunks[@]}
          
          if [ $total -eq 0 ]; then
            echo "❌ تکه‌ای نیست!"
            exit 1
          fi
          
          echo "📦 $total تکه"
          
          # هر بار ۱۵ تکه push کن
          BATCH=15
          start=0
          
          while [ $start -lt $total ]; do
            end=$((start + BATCH - 1))
            [ $end -ge $total ] && end=$((total - 1))
            
            echo "📤 [$((start+1))-$((end+1))]"
            
            for i in $(seq $start $end); do
              git add "${chunks[$i]}"
            done
            
            git commit -m "📦 $((start+1))-$((end+1))/$total [${{ env.MAIN_FOLDER }}]"
            git pull --rebase && git push || sleep 10 && git pull --rebase && git push
            
            start=$((end + 1))
            sleep 2
          done
          
          echo "🎉 تموم!"
