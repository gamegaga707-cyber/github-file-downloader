name: دانلود چند فایل (پایدار و ساده)

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'لینک‌ها با جداکننده ;'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور فایل‌های ZIP'
        required: true
        type: string
      custom_folder:
        description: 'نام پوشه (اختیاری)'
        required: false
        type: string
        default: ''
      delimiter:
        description: 'جداکننده (پیش‌فرض: ;)'
        required: false
        type: string
        default: ';'

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest

    steps:
   - name: دریافت کد مخزن (فقط متادیتا، بدون فایل‌های حجیم)
  run: |
    git init
    git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
    git fetch --depth=1 --filter=blob:none origin ${{ github.ref_name }}
    git checkout FETCH_HEAD

      - name: نصب پیش‌نیازها
        run: sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full curl

      - name: ایجاد پوشه اصلی
        run: |
          if [ -n "${{ github.event.inputs.custom_folder }}" ]; then
            MAIN_FOLDER="downloads/${{ github.event.inputs.custom_folder }}"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            MAIN_FOLDER="downloads/batch_${TIMESTAMP}_${{ github.run_number }}"
          fi
          mkdir -p "$MAIN_FOLDER"
          echo "MAIN_FOLDER=$MAIN_FOLDER" >> $GITHUB_ENV
          echo "📁 پوشه: $MAIN_FOLDER"

      - name: دانلود و پردازش (ترتیبی)
        run: |
          DELIMITER="${{ github.event.inputs.delimiter }}"
          IFS="$DELIMITER" read -ra urls <<< "${{ github.event.inputs.file_urls }}"
          
          clean_urls=()
          for url in "${urls[@]}"; do
            url=$(echo "$url" | xargs)
            [ -n "$url" ] && clean_urls+=("$url")
          done
          
          total_urls=${#clean_urls[@]}
          echo "📊 تعداد لینک: $total_urls"
          
          success=0
          fail=0
          total_bytes=0
          file_index=0

          for i in "${!clean_urls[@]}"; do
            url="${clean_urls[$i]}"
            current=$((i + 1))
            file_index=$((file_index + 1))
            
            echo ""
            echo "═════════════════════════════════════════════"
            echo "📥 [$current/$total_urls] پردازش لینک"
            
            # استخراج نام فایل از URL
            RAW_FILENAME=$(echo "$url" | grep -oP '[^/]+\.(mp4|mkv|avi|mov|webm|flv|mp3|m4a|jpg|png|gif|pdf|zip|rar|7z)(\?.*)?$' | cut -d '?' -f1)
            if [ -z "$RAW_FILENAME" ]; then
              RAW_FILENAME=$(basename "$url" | cut -d '?' -f1 | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null || basename "$url" | cut -d '?' -f1)
            fi
            FILENAME=$(echo "$RAW_FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            # اگر نام معنی‌دار نبود، یک نام ساده بگذار
            if [ -z "$FILENAME" ] || [ ${#FILENAME} -lt 3 ] || [ ${#FILENAME} -gt 80 ]; then
              FILENAME=$(printf "file_%02d" $current)
            fi
            
            echo "📄 نام فایل: $FILENAME"
            
            # دانلود با curl
            echo "⬇️ شروع دانلود..."
            if curl -L --fail --retry 3 --retry-delay 3 \
                 --connect-timeout 20 --max-time 600 \
                 -o "${{ env.MAIN_FOLDER }}/${FILENAME}" \
                 "$url" 2>/dev/null; then
              
              FILE_SIZE=$(stat -c%s "${{ env.MAIN_FOLDER }}/${FILENAME}" 2>/dev/null || echo 0)
              if [ "$FILE_SIZE" = "0" ]; then
                echo "❌ حجم فایل صفر است - رد شد"
                rm -f "${{ env.MAIN_FOLDER }}/${FILENAME}"
                fail=$((fail + 1))
                continue
              fi
              
              echo "✅ دانلود موفق: $(numfmt --to=iec $FILE_SIZE)"
              total_bytes=$((total_bytes + FILE_SIZE))
              
              # تشخیص نوع فایل برای افزودن پسوند در صورت نیاز
              MIME=$(file --mime-type -b "${{ env.MAIN_FOLDER }}/${FILENAME}" 2>/dev/null)
              case "$MIME" in
                video/mp4)             EXT=".mp4" ;;
                video/x-matroska)      EXT=".mkv" ;;
                video/webm)            EXT=".webm" ;;
                video/x-msvideo)       EXT=".avi" ;;
                video/quicktime)       EXT=".mov" ;;
                audio/mpeg)            EXT=".mp3" ;;
                audio/mp4)             EXT=".m4a" ;;
                image/jpeg)            EXT=".jpg" ;;
                image/png)             EXT=".png" ;;
                application/pdf)       EXT=".pdf" ;;
                application/zip)       EXT=".zip" ;;
              esac
              
              if [ -n "$EXT" ] && [[ ! "$FILENAME" =~ \.[a-zA-Z0-9]+$ ]]; then
                mv "${{ env.MAIN_FOLDER }}/${FILENAME}" "${{ env.MAIN_FOLDER }}/${FILENAME}${EXT}"
                FILENAME="${FILENAME}${EXT}"
              fi
              
              # نام آرشیو ساده مثل file_01
              ARCHIVE_NAME=$(printf "file_%02d" $file_index)
              
              echo "🗜️ در حال فشرده‌سازی..."
              cd "${{ env.MAIN_FOLDER }}"
              
              if 7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=0 -v95m \
                   "${ARCHIVE_NAME}.7z" "$FILENAME" > /dev/null 2>&1; then
                echo "✅ آرشیو ساخته شد: ${ARCHIVE_NAME}.7z.xxx (حاوی: $FILENAME)"
                rm -f "$FILENAME"
                success=$((success + 1))
              else
                echo "❌ خطا در فشرده‌سازی"
                fail=$((fail + 1))
              fi
              
              cd - > /dev/null
            else
              echo "❌ دانلود ناموفق"
              fail=$((fail + 1))
            fi
          done
          
          echo ""
          echo "═════════════════════════════════════════════"
          echo "📊 آمار نهایی: کل=$total_urls | ✅$success | ❌$fail"
          echo "📊 مجموع حجم دانلود موفق: $(numfmt --to=iec $total_bytes)"

      - name: commit و push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cd "${{ env.MAIN_FOLDER }}"
          
          if ! ls *.7z.* 2>/dev/null; then
            echo "❌ هیچ فایل فشرده‌ای وجود ندارد!"
            exit 1
          fi
          
          chunks=(*.7z.*)
          total=${#chunks[@]}
          echo "📦 $total تکه"
          
          BATCH=10
          start=0
          
          while [ $start -lt $total ]; do
            end=$((start + BATCH - 1))
            [ $end -ge $total ] && end=$((total - 1))
            
            echo "📤 [$((start+1))-$((end+1))]"
            
            for i in $(seq $start $end); do
              git add "${chunks[$i]}"
            done
            
            git commit -m "📦 $((start+1))-$((end+1))/$total [${{ env.MAIN_FOLDER }}]"
            
            for attempt in {1..5}; do
              if git pull --rebase && git push; then
                echo "✅ Push موفق"
                break
              else
                echo "⚠️ تلاش $attempt ناموفق - ۵ ثانیه صبر"
                sleep 5
              fi
            done
            
            start=$((end + 1))
            sleep 2
          done
          
          echo "🎉 تموم!"
