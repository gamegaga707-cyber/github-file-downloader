name: دانلود چند فایل (سرعت بالا + اسم درست)

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'لینک‌ها با جداکننده ;'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور فایل‌های ZIP'
        required: true
        type: string
      custom_folder:
        description: 'نام پوشه (اختیاری)'
        required: false
        type: string
        default: ''
      delimiter:
        description: 'جداکننده (پیش‌فرض: ;)'
        required: false
        type: string
        default: ';'

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت مخزن (فقط ساختار git، بدون فایل)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .nonexistent-file
          sparse-checkout-cone-mode: false

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full aria2 parallel

      - name: ایجاد پوشه اصلی
        run: |
          if [ -n "${{ github.event.inputs.custom_folder }}" ]; then
            MAIN_FOLDER="downloads/${{ github.event.inputs.custom_folder }}"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            MAIN_FOLDER="downloads/batch_${TIMESTAMP}_${{ github.run_number }}"
          fi
          mkdir -p "$MAIN_FOLDER"
          echo "MAIN_FOLDER=$MAIN_FOLDER" >> $GITHUB_ENV
          echo "📁 پوشه: $MAIN_FOLDER"

      - name: دانلود و پردازش (سرعت بالا با aria2)
        run: |
          DELIMITER="${{ github.event.inputs.delimiter }}"
          IFS="$DELIMITER" read -ra urls <<< "${{ github.event.inputs.file_urls }}"
          
          # پاکسازی URL ها
          clean_urls=()
          for url in "${urls[@]}"; do
            url=$(echo "$url" | xargs)
            [ -n "$url" ] && clean_urls+=("$url")
          done
          
          total_urls=${#clean_urls[@]}
          echo "📊 تعداد لینک: $total_urls"
          
          # ایجاد فایل ورودی برای aria2 با نام‌های اختصاصی
          ARIA2_INPUT="/tmp/aria2_urls.txt"
          > "$ARIA2_INPUT"
          
          declare -A url_to_name
          
          for i in "${!clean_urls[@]}"; do
            url="${clean_urls[$i]}"
            current=$((i + 1))
            
            # استخراج نام فایل از URL
            RAW_FILENAME=$(echo "$url" | grep -oP '[^/]+\.(mp4|mkv|avi|mov|webm|flv|mp3|m4a|jpg|png|gif|pdf|zip|rar|7z)(\?.*)?$' | cut -d '?' -f1)
            
            if [ -z "$RAW_FILENAME" ]; then
              RAW_FILENAME=$(basename "$url" | cut -d '?' -f1 | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null || basename "$url" | cut -d '?' -f1)
            fi
            
            # پاکسازی نام فایل
            FILENAME=$(echo "$RAW_FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g' | sed 's/__*/_/g')
            
            # اگر نام معتبر نبود، نام پیش‌فرض
            if [ -z "$FILENAME" ] || [ ${#FILENAME} -lt 3 ] || [ ${#FILENAME} -gt 100 ]; then
              EXT="${RAW_FILENAME##*.}"
              FILENAME="file_$(printf "%03d" $current).${EXT}"
            fi
            
            # جلوگیری از نام‌های تکراری
            if [ -f "${{ env.MAIN_FOLDER }}/${FILENAME}" ] || [ "${url_to_name[$FILENAME]}" ]; then
              BASE="${FILENAME%.*}"
              EXT="${FILENAME##*.}"
              FILENAME="${BASE}_$(printf "%03d" $current).${EXT}"
            fi
            
            url_to_name[$FILENAME]=1
            echo "$url" >> "$ARIA2_INPUT"
            echo "  out=$FILENAME" >> "$ARIA2_INPUT"
            echo "📥 [$current/$total_urls] $FILENAME"
          done
          
          echo "🚀 شروع دانلود موازی با aria2 (اتصالات همزمان)..."
          
          # دانلود با aria2 - بهینه‌سازی شده برای سرعت
          aria2c \
            --input-file="$ARIA2_INPUT" \
            --dir="${{ env.MAIN_FOLDER }}" \
            --max-concurrent-downloads="$total_urls" \
            --max-connection-per-server=8 \
            --split=8 \
            --min-split-size=1M \
            --max-tries=5 \
            --retry-wait=3 \
            --timeout=30 \
            --connect-timeout=10 \
            --allow-overwrite=false \
            --auto-file-renaming=false \
            --file-allocation=none \
            --console-log-level=notice \
            --summary-interval=0
          
          echo "✅ همه دانلودها تموم شد!"
          
          cd "${{ env.MAIN_FOLDER }}"
          
          # پردازش فایل‌های دانلود شده
          success=0
          fail=0
          file_index=0
          
          for FILENAME in *; do
            [ ! -f "$FILENAME" ] && continue
            file_index=$((file_index + 1))
            
            FILE_SIZE=$(stat -c%s "$FILENAME" 2>/dev/null || echo 0)
            
            if [ "$FILE_SIZE" = "0" ]; then
              echo "❌ $FILENAME حجم صفر - رد شد"
              rm -f "$FILENAME"
              fail=$((fail + 1))
              continue
            fi
            
            echo "✅ $FILENAME ($(numfmt --to=iec $FILE_SIZE 2>/dev/null || echo $FILE_SIZE))"
            
            # تشخیص نوع فایل و اصلاح پسوند
            MIME=$(file --mime-type -b "$FILENAME" 2>/dev/null)
            
            EXT=""
            case "$MIME" in
              video/mp4)             EXT=".mp4" ;;
              video/x-matroska)      EXT=".mkv" ;;
              video/webm)            EXT=".webm" ;;
              video/x-msvideo)       EXT=".avi" ;;
              video/quicktime)       EXT=".mov" ;;
              video/x-flv)           EXT=".flv" ;;
              audio/mpeg)            EXT=".mp3" ;;
              audio/mp4|audio/x-m4a) EXT=".m4a" ;;
              image/jpeg)            EXT=".jpg" ;;
              image/png)             EXT=".png" ;;
              image/gif)             EXT=".gif" ;;
              application/pdf)       EXT=".pdf" ;;
              application/zip)       EXT=".zip" ;;
              application/x-rar)     EXT=".rar" ;;
              application/x-7z-compressed) EXT=".7z" ;;
            esac
            
            if [ -n "$EXT" ] && [[ ! "$FILENAME" =~ \.[a-zA-Z0-9]+$ ]]; then
              mv "$FILENAME" "${FILENAME}${EXT}" 2>/dev/null
              FILENAME="${FILENAME}${EXT}"
            fi
            
            # فشرده‌سازی با 7z
            ARCHIVE_NAME=$(printf "file_%03d" $file_index)
            
            if 7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=0 -v95m \
                 "${ARCHIVE_NAME}.7z" "$FILENAME" > /dev/null 2>&1; then
              echo "  🗜️ ${ARCHIVE_NAME}.7z.* (حاوی: $FILENAME)"
              rm -f "$FILENAME"
              success=$((success + 1))
            else
              echo "  ❌ خطای فشرده‌سازی"
              fail=$((fail + 1))
            fi
          done
          
          cd - > /dev/null
          
          echo ""
          echo "═════════════════════════════════════════════"
          echo "📊 نهایی: کل=$total_urls | ✅$success | ❌$fail"

      - name: commit و push (بهینه‌شده)
        run: |
          git sparse-checkout disable
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cd "${{ env.MAIN_FOLDER }}"
          
          # پیدا کردن همه تکه‌ها
          chunks=()
          for f in *.7z.*; do
            [ -f "$f" ] && chunks+=("$f")
          done
          
          total=${#chunks[@]}
          
          if [ $total -eq 0 ]; then
            echo "❌ تکه‌ای نیست!"
            exit 1
          fi
          
          echo "📦 $total تکه پیدا شد"
          
          BATCH=15
          start=0
          
          while [ $start -lt $total ]; do
            end=$((start + BATCH - 1))
            [ $end -ge $total ] && end=$((total - 1))
            
            echo "📤 Batch [$((start+1))-$((end+1))] از $total"
            
            for i in $(seq $start $end); do
              git add "${chunks[$i]}"
            done
            
            git commit -m "📦 $((start+1))-$((end+1))/$total [${{ env.MAIN_FOLDER }}]"
            
            # تلاش برای push با retry
            for retry in 1 2 3; do
              if git pull --rebase 2>/dev/null && git push 2>/dev/null; then
                break
              fi
              sleep $(($retry * 3))
            done
            
            start=$((end + 1))
          done
          
          echo "🎉 تموم!"
