name: دانلود چند فایل (سرعت بالا + اسم درست)

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'لینک‌ها با جداکننده ;'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور فایل‌های ZIP'
        required: true
        type: string
      custom_folder:
        description: 'نام پوشه (اختیاری)'
        required: false
        type: string
        default: ''
      delimiter:
        description: 'جداکننده (پیش‌فرض: ;)'
        required: false
        type: string
        default: ';'

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest

    steps:
      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full curl

      - name: ایجاد پوشه اصلی
        run: |
          if [ -n "${{ github.event.inputs.custom_folder }}" ]; then
            MAIN_FOLDER="downloads/${{ github.event.inputs.custom_folder }}"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            MAIN_FOLDER="downloads/batch_${TIMESTAMP}_${{ github.run_number }}"
          fi
          mkdir -p "$MAIN_FOLDER"
          echo "MAIN_FOLDER=$MAIN_FOLDER" >> $GITHUB_ENV
          echo "📁 پوشه: $MAIN_FOLDER"

      - name: دانلود و پردازش (سرعت بالا)
        run: |
          DELIMITER="${{ github.event.inputs.delimiter }}"
          IFS="$DELIMITER" read -ra urls <<< "${{ github.event.inputs.file_urls }}"
          
          # پاکسازی لینک‌ها
          clean_urls=()
          for url in "${urls[@]}"; do
            url=$(echo "$url" | xargs)
            [ -n "$url" ] && clean_urls+=("$url")
          done
          
          total_urls=${#clean_urls[@]}
          echo "📊 تعداد لینک: $total_urls"
          
          success=0
          fail=0
          
          # آرایه برای نگهداری اسم فایل‌ها
          declare -a dl_files
          
          # ====== مرحله ۱: دانلود همه فایل‌ها به صورت موازی ======
          echo "🚀 شروع دانلود موازی $total_urls فایل..."
          
          for i in "${!clean_urls[@]}"; do
            url="${clean_urls[$i]}"
            current=$((i + 1))
            
            # استخراج اسم فایل از URL
            RAW_FILENAME=$(echo "$url" | grep -oP '[^/]+\.(mp4|mkv|avi|mov|webm|flv|mp3|m4a|jpg|png|gif|pdf|zip|rar|7z)(\?.*)?$' | cut -d '?' -f1)
            
            if [ -z "$RAW_FILENAME" ]; then
              RAW_FILENAME=$(basename "$url" | cut -d '?' -f1 | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null || basename "$url" | cut -d '?' -f1)
            fi
            
            # حذف کاراکترهای غیرمجاز
            FILENAME=$(echo "$RAW_FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            # اگه اسم معنی‌دار نبود، اسم ساده بذار
            if [ -z "$FILENAME" ] || [ ${#FILENAME} -lt 3 ] || [ ${#FILENAME} -gt 80 ]; then
              FILENAME=$(printf "file_%02d" $current)
            fi
            
            echo "📥 [$current/$total_urls] $FILENAME"
            
            # دانلود در پس‌زمینه (همه همزمان)
            curl -L --fail --retry 3 --retry-delay 3 \
                 --connect-timeout 20 --max-time 900 \
                 -o "${{ env.MAIN_FOLDER }}/${FILENAME}" \
                 "$url" 2>/dev/null &
            
            dl_files+=("$FILENAME")
          done
          
          # صبر کن تا همه دانلودها تموم بشن
          echo "⏳ منتظر اتمام دانلودها..."
          wait
          echo "✅ همه دانلودها تموم شد!"
          
          # ====== مرحله ۲: بررسی و فشرده‌سازی ======
          cd "${{ env.MAIN_FOLDER }}"
          
          file_index=0
          for FILENAME in "${dl_files[@]}"; do
            file_index=$((file_index + 1))
            
            if [ ! -f "$FILENAME" ]; then
              echo "❌ $FILENAME دانلود نشد!"
              fail=$((fail + 1))
              continue
            fi
            
            FILE_SIZE=$(stat -c%s "$FILENAME" 2>/dev/null || echo 0)
            
            if [ "$FILE_SIZE" = "0" ]; then
              echo "❌ $FILENAME حجم صفر - رد شد"
              rm -f "$FILENAME"
              fail=$((fail + 1))
              continue
            fi
            
            echo "✅ $FILENAME ($(numfmt --to=iec $FILE_SIZE))"
            
            # تشخیص فرمت واقعی
            MIME=$(file --mime-type -b "$FILENAME" 2>/dev/null)
            EXT=""
            
            case "$MIME" in
              video/mp4)             EXT=".mp4" ;;
              video/x-matroska)      EXT=".mkv" ;;
              video/webm)            EXT=".webm" ;;
              video/x-msvideo)       EXT=".avi" ;;
              video/quicktime)       EXT=".mov" ;;
              audio/mpeg)            EXT=".mp3" ;;
              audio/mp4)             EXT=".m4a" ;;
              image/jpeg)            EXT=".jpg" ;;
              image/png)             EXT=".png" ;;
              application/pdf)       EXT=".pdf" ;;
              application/zip)       EXT=".zip" ;;
            esac
            
            # اضافه کردن پسوند اگه نداره
            if [[ ! "$FILENAME" =~ \.[a-zA-Z0-9]+$ ]] && [ -n "$EXT" ]; then
              mv "$FILENAME" "${FILENAME}${EXT}"
              FILENAME="${FILENAME}${EXT}"
            fi
            
            # اسم ساده برای فایل فشرده: file_01, file_02, ...
            ARCHIVE_NAME=$(printf "file_%02d" $file_index)
            
            # فشرده‌سازی سریع (فایل داخلش اسم اصلی رو حفظ می‌کنه)
            if 7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=0 -v95m \
                 "${ARCHIVE_NAME}.7z" "$FILENAME" > /dev/null 2>&1; then
              echo "  🗜️ ${ARCHIVE_NAME}.7z.xxx (حاوی: $FILENAME)"
              rm -f "$FILENAME"
              success=$((success + 1))
            else
              echo "  ❌ خطای فشرده‌سازی"
              fail=$((fail + 1))
            fi
          done
          
          cd - > /dev/null
          
          echo ""
          echo "═════════════════════════════════════════════"
          echo "📊 نهایی: کل=$total_urls | ✅$success | ❌$fail"
          echo "═════════════════════════════════════════════"

      - name: commit و push (بهینه‌شده)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cd "${{ env.MAIN_FOLDER }}"
          chunks=(*.7z.*)
          total=${#chunks[@]}
          
          if [ $total -eq 0 ]; then
            echo "❌ تکه‌ای نیست!"
            exit 1
          fi
          
          echo "📦 $total تکه"
          
          BATCH=15
          start=0
          
          while [ $start -lt $total ]; do
            end=$((start + BATCH - 1))
            [ $end -ge $total ] && end=$((total - 1))
            
            echo "📤 [$((start+1))-$((end+1))]"
            
            for i in $(seq $start $end); do
              git add "${chunks[$i]}"
            done
            
            git commit -m "📦 $((start+1))-$((end+1))/$total [${{ env.MAIN_FOLDER }}]"
            git pull --rebase && git push || sleep 10 && git pull --rebase && git push
            
            start=$((end + 1))
            sleep 2
          done
          
          echo "🎉 تموم!"
