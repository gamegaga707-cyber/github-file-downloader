name: آپلود کل پوشه downloads به Google Drive

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'نام فایل ZIP در گوگل درایو (اختیاری)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  upload-all-to-gdrive:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت فقط پوشه downloads
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            downloads
          sparse-checkout-cone-mode: false

      - name: بررسی وضعیت پوشه downloads
        run: |
          echo "========== اطلاعات پوشه =========="
          pwd
          ls -la
          
          if [ ! -d "downloads" ]; then
            echo "❌ پوشه downloads پیدا نشد!"
            exit 1
          fi
          
          echo ""
          echo "========== محتویات downloads =========="
          ls -lhR downloads/
          
          echo ""
          echo "========== آمار =========="
          FOLDER_COUNT=$(find downloads -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          FILE_COUNT=$(find downloads -type f 2>/dev/null | wc -l)
          TOTAL_SIZE=$(du -sh downloads 2>/dev/null | cut -f1)
          
          echo "پوشه‌ها: $FOLDER_COUNT"
          echo "فایل‌ها: $FILE_COUNT"
          echo "حجم کل: $TOTAL_SIZE"
          
          if [ "$FILE_COUNT" = "0" ]; then
            echo ""
            echo "❌ پوشه downloads خالیه! اول workflow دانلود رو اجرا کن."
            exit 1
          fi

      - name: ساخت فایل ZIP
        run: |
          # تعیین نام
          if [ -n "${{ github.event.inputs.zip_name }}" ]; then
            ZIP_NAME="${{ github.event.inputs.zip_name }}.zip"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            ZIP_NAME="downloads_backup_${TIMESTAMP}.zip"
          fi
          
          echo "📦 نام فایل خروجی: $ZIP_NAME"
          echo "📂 در حال فشرده‌سازی کل پوشه downloads..."
          
          # ساخت ZIP با نمایش فایل‌ها
          zip -r "${ZIP_NAME}" downloads/
          
          # بررسی نتیجه
          if [ ! -f "${ZIP_NAME}" ]; then
            echo "❌ فایل ZIP ساخته نشد!"
            exit 1
          fi
          
          ZIP_SIZE=$(du -h "$ZIP_NAME" | cut -f1)
          ZIP_SIZE_BYTES=$(stat -c%s "$ZIP_NAME")
          
          echo "✅ فایل ZIP ساخته شد"
          echo "📏 حجم: $ZIP_SIZE ($ZIP_SIZE_BYTES بایت)"
          
          if [ "$ZIP_SIZE_BYTES" = "0" ]; then
            echo "❌ حجم فایل صفر بایت است!"
            exit 1
          fi
          
          # نمایش محتویات ZIP
          echo ""
          echo "📋 محتویات فایل ZIP:"
          unzip -l "$ZIP_NAME" | tail -n +4 | head -n -2
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_PATH=$(pwd)/$ZIP_NAME" >> $GITHUB_ENV

      - name: آپلود به Google Drive
        uses: mathisve/gdrive-upload-action@main
        with:
          filename: ${{ env.ZIP_NAME }}
          name: ${{ env.ZIP_NAME }}
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          encoded: true
          overwrite: true

      - name: گزارش نهایی
        run: |
          echo ""
          echo "═════════════════════════════════════════════"
          echo "🎉 آپلود با موفقیت انجام شد!"
          echo "📁 فایل: ${{ env.ZIP_NAME }}"
          echo "☁️  مقصد: Google Drive (Folder ID: مخفی)"
          echo "═════════════════════════════════════════════"
