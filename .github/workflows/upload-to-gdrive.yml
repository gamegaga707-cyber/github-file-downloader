name: آپلود کل پوشه downloads به Google Drive

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'نام فایل ZIP در گوگل درایو (اختیاری - خالی بذارید از تاریخ استفاده بشه)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  upload-all-to-gdrive:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: بررسی وجود پوشه downloads
        run: |
          if [ ! -d "downloads" ]; then
            echo "❌ پوشه downloads پیدا نشد!"
            exit 1
          fi
          
          echo "📂 محتویات پوشه downloads:"
          ls -lh downloads/
          echo ""
          
          # شمارش فایل‌ها و پوشه‌ها
          FILE_COUNT=$(find downloads -type f | wc -l)
          FOLDER_COUNT=$(find downloads -mindepth 1 -maxdepth 1 -type d | wc -l)
          TOTAL_SIZE=$(du -sh downloads | cut -f1)
          
          echo "📊 آمار:"
          echo "   پوشه‌ها: $FOLDER_COUNT"
          echo "   فایل‌ها: $FILE_COUNT"
          echo "   حجم کل: $TOTAL_SIZE"

      - name: ساخت فایل ZIP از کل پوشه downloads
        run: |
          # تعیین نام فایل
          if [ -n "${{ github.event.inputs.zip_name }}" ]; then
            ZIP_NAME="${{ github.event.inputs.zip_name }}.zip"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            ZIP_NAME="downloads_backup_${TIMESTAMP}.zip"
          fi
          
          echo "📦 در حال فشرده‌سازی کل پوشه downloads..."
          zip -r "${ZIP_NAME}" downloads/ > /dev/null
          
          ZIP_SIZE=$(du -h "$ZIP_NAME" | cut -f1)
          echo "✅ فایل ZIP ساخته شد: $ZIP_NAME"
          echo "📏 حجم: $ZIP_SIZE"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: آپلود به Google Drive
        uses: mathisve/gdrive-upload-action@main
        with:
          filename: ${{ env.ZIP_NAME }}
          name: ${{ env.ZIP_NAME }}
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          encoded: true
          overwrite: true

      - name: گزارش نهایی
        run: |
          echo ""
          echo "═════════════════════════════════════════════"
          echo "🎉 کل پوشه downloads با موفقیت آپلود شد!"
          echo "📁 فایل: ${{ env.ZIP_NAME }}"
          echo "☁️  مقصد: Google Drive"
          echo "═════════════════════════════════════════════"
