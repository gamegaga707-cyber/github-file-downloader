name: آپلود فایل‌ها به Google Drive

on:
  workflow_dispatch:
    inputs:
      source_folder:
        description: 'مسیر پوشه فایل‌های دانلود شده (مثلاً: downloads/batch_20260428_210300_11)'
        required: true
        type: string
      zip_name:
        description: 'نام فایل ZIP در گوگل درایو (اختیاری)'
        required: false
        type: string
        default: ''
      overwrite:
        description: 'بازنویسی فایل موجود؟'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  upload-to-gdrive:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: بررسی وجود پوشه
        run: |
          if [ ! -d "${{ github.event.inputs.source_folder }}" ]; then
            echo "❌ پوشه ${{ github.event.inputs.source_folder }} پیدا نشد!"
            echo ""
            echo "پوشه‌های موجود در downloads/:"
            ls -d downloads/*/ 2>/dev/null || echo "  (هیچ پوشه‌ای نیست)"
            exit 1
          fi
          
          echo "✅ پوشه پیدا شد: ${{ github.event.inputs.source_folder }}"
          echo ""
          echo "📂 محتویات پوشه:"
          ls -lh "${{ github.event.inputs.source_folder }}/"

      - name: ساخت فایل ZIP
        run: |
          SOURCE="${{ github.event.inputs.source_folder }}"
          
          # تعیین نام فایل ZIP
          if [ -n "${{ github.event.inputs.zip_name }}" ]; then
            ZIP_NAME="${{ github.event.inputs.zip_name }}.zip"
          else
            FOLDER_NAME=$(basename "$SOURCE")
            ZIP_NAME="${FOLDER_NAME}.zip"
          fi
          
          echo "📦 در حال فشرده‌سازی $SOURCE به $ZIP_NAME ..."
          
          cd "$SOURCE"
          zip -r "../../${ZIP_NAME}" . > /dev/null
          cd ../..
          
          ZIP_SIZE=$(du -h "$ZIP_NAME" | cut -f1)
          echo "✅ فایل ZIP ساخته شد: $ZIP_NAME (حجم: $ZIP_SIZE)"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: آپلود به Google Drive
        uses: mathisve/gdrive-upload-action@main
        with:
          filename: ${{ env.ZIP_NAME }}
          name: ${{ env.ZIP_NAME }}
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          encoded: true
          overwrite: ${{ github.event.inputs.overwrite }}

      - name: گزارش نهایی
        run: |
          echo ""
          echo "═════════════════════════════════════════════"
          echo "🎉 آپلود با موفقیت انجام شد!"
          echo "📁 فایل: ${{ env.ZIP_NAME }}"
          echo "📂 پوشه مقصد: Google Drive (Folder ID: ${GDRIVE_FOLDER_ID:0:10}...)"
          echo "═════════════════════════════════════════════"
